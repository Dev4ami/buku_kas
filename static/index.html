<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Kas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/chart.js"></script>
<style>
  :root {
    --bg: #F1F4F1;
    --ink: #171B18;
    --muted: #7C837E;
    --paper: #FFFFFF;
    --line: #E1E6E1;
    --red: #C4452F;
    --green: #2E7D4F;
    --teal: #167C80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    padding: 20px 16px 48px;
    max-width: 760px;
    margin: 0 auto;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  h1 .dot { color: var(--teal); }
  #month {
    font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    border: 1.5px solid var(--ink); background: var(--paper);
    padding: 7px 10px; border-radius: 6px; color: var(--ink);
  }
  #month:focus { outline: 2px solid var(--teal); outline-offset: 1px; }

  .totals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .total-card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px;
  }
  .total-card .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 6px;
  }
  .total-card .value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; }
  .value.expense { color: var(--red); }
  .value.income { color: var(--green); }

  .panel {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 10px; padding: 16px; margin-bottom: 18px;
  }
  .panel h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 620px) {
    .charts { grid-template-columns: 1fr; }
    .totals { grid-template-columns: 1fr 1fr; }
    .totals .total-card:last-child { grid-column: span 2; }
  }
  .chart-box { position: relative; height: 230px; }

  /* ===== Struk (signature) ===== */
  .receipt {
    background: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 22px 18px 26px;
    box-shadow: 0 2px 10px rgba(23,27,24,0.07);
    /* tepi sobekan struk */
    --notch: 10px;
    clip-path: polygon(
      0 6px, 3% 0, 6% 6px, 9% 0, 12% 6px, 15% 0, 18% 6px, 21% 0, 24% 6px,
      27% 0, 30% 6px, 33% 0, 36% 6px, 39% 0, 42% 6px, 45% 0, 48% 6px,
      51% 0, 54% 6px, 57% 0, 60% 6px, 63% 0, 66% 6px, 69% 0, 72% 6px,
      75% 0, 78% 6px, 81% 0, 84% 6px, 87% 0, 90% 6px, 93% 0, 96% 6px, 100% 0,
      100% calc(100% - 6px), 96% 100%, 93% calc(100% - 6px), 90% 100%,
      87% calc(100% - 6px), 84% 100%, 81% calc(100% - 6px), 78% 100%,
      75% calc(100% - 6px), 72% 100%, 69% calc(100% - 6px), 66% 100%,
      63% calc(100% - 6px), 60% 100%, 57% calc(100% - 6px), 54% 100%,
      51% calc(100% - 6px), 48% 100%, 45% calc(100% - 6px), 42% 100%,
      39% calc(100% - 6px), 36% 100%, 33% calc(100% - 6px), 30% 100%,
      27% calc(100% - 6px), 24% 100%, 21% calc(100% - 6px), 18% 100%,
      15% calc(100% - 6px), 12% 100%, 9% calc(100% - 6px), 6% 100%,
      3% calc(100% - 6px), 0 100%
    );
  }
  .receipt-head { text-align: center; margin-bottom: 14px; }
  .receipt-head .title { font-weight: 600; letter-spacing: 0.14em; }
  .receipt-head .sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .rule { border: none; border-top: 1.5px dashed var(--line); margin: 12px 0; }
  .rx { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; }
  .rx .date { color: var(--muted); font-size: 11px; flex: 0 0 46px; }
  .rx .desc { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rx .leaders { flex: 1 1 8px; border-bottom: 1.5px dotted var(--line); transform: translateY(-3px); }
  .rx .amt { font-weight: 500; white-space: nowrap; }
  .rx .amt.in { color: var(--green); }
  .receipt-foot { text-align: center; color: var(--muted); font-size: 11px; margin-top: 14px; letter-spacing: 0.1em; }
  .empty { text-align: center; color: var(--muted); padding: 12px 0; }

  #err { display: none; background: #FBEAE6; border: 1px solid var(--red);
    color: var(--red); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; }
  @media (prefers-reduced-motion: no-preference) {
    .panel, .receipt, .total-card { animation: rise .35s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>
<header>
  <h1>Buku Kas<span class="dot">.</span></h1>
  <input type="month" id="month" aria-label="Pilih bulan">
</header>

<div id="err"></div>

<section class="totals" aria-label="Ringkasan">
  <div class="total-card"><div class="label">Keluar</div><div class="value expense" id="t-expense">—</div></div>
  <div class="total-card"><div class="label">Masuk</div><div class="value income" id="t-income">—</div></div>
  <div class="total-card"><div class="label">Selisih</div><div class="value" id="t-net">—</div></div>
</section>

<section class="panel">
  <div class="charts">
    <div>
      <h2>Per kategori</h2>
      <div class="chart-box"><canvas id="catChart"></canvas></div>
    </div>
    <div>
      <h2>Per hari</h2>
      <div class="chart-box"><canvas id="dayChart"></canvas></div>
    </div>
  </div>
</section>

<section class="receipt" aria-label="Daftar transaksi">
  <div class="receipt-head">
    <div class="title">*** BUKU KAS ***</div>
    <div class="sub" id="receipt-month">&nbsp;</div>
  </div>
  <hr class="rule">
  <div id="txlist"></div>
  <hr class="rule">
  <div class="receipt-foot">*** TERIMA KASIH, JANGAN BOROS ***</div>
</section>

<script>
const $ = id => document.getElementById(id);
const token = new URLSearchParams(location.search).get('token');
let catChart, dayChart;

const rp = n => 'Rp' + Math.abs(n).toLocaleString('id-ID');
const PALETTE = ['#167C80','#C4452F','#E0A426','#2E7D4F','#5B5EA6','#B65C8E','#7C837E'];

function nowMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

async function load(month) {
  $('err').style.display = 'none';
  try {
    const q = new URLSearchParams({ month });
    if (token) q.set('token', token);
    const res = await fetch('/api/summary?' + q);
    if (!res.ok) throw new Error(res.status === 401
      ? 'Token salah atau belum diisi. Tambahkan ?token=... di URL.'
      : 'Gagal memuat data (HTTP ' + res.status + ').');
    render(await res.json());
  } catch (e) {
    $('err').textContent = e.message;
    $('err').style.display = 'block';
  }
}

function render(d) {
  $('t-expense').textContent = rp(d.expense);
  $('t-income').textContent = rp(d.income);
  const net = d.income - d.expense;
  const netEl = $('t-net');
  netEl.textContent = (net < 0 ? '−' : '') + rp(net);
  netEl.className = 'value ' + (net < 0 ? 'expense' : 'income');

  // Doughnut kategori
  const labels = d.by_category.map(c => c.emoji + ' ' + c.name);
  const values = d.by_category.map(c => c.total);
  catChart?.destroy();
  catChart = new Chart($('catChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: PALETTE, borderWidth: 0 }] },
    options: {
      maintainAspectRatio: false, cutout: '62%',
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, font: { family: "'IBM Plex Mono', monospace", size: 11 } } },
        tooltip: { callbacks: { label: ctx => ' ' + rp(ctx.parsed) } }
      }
    }
  });

  // Bar harian — isi hari kosong dengan 0 biar sumbu-x utuh
  const [y, m] = d.month.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const perDay = Array(daysInMonth).fill(0);
  d.daily.forEach(r => { perDay[r.day - 1] = r.total; });
  dayChart?.destroy();
  dayChart = new Chart($('dayChart'), {
    type: 'bar',
    data: {
      labels: Array.from({ length: daysInMonth }, (_, i) => i + 1),
      datasets: [{ data: perDay, backgroundColor: '#167C80', borderRadius: 3 }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + rp(ctx.parsed.y) } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: "'IBM Plex Mono', monospace", size: 10 }, maxTicksLimit: 11 } },
        y: { ticks: { font: { family: "'IBM Plex Mono', monospace", size: 10 }, callback: v => v >= 1e6 ? (v/1e6)+'jt' : v >= 1e3 ? (v/1e3)+'rb' : v } }
      }
    }
  });

  // Struk
  $('receipt-month').textContent = new Date(y, m - 1).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }).toUpperCase();
  const list = $('txlist');
  list.innerHTML = '';
  if (!d.transactions.length) {
    list.innerHTML = '<div class="empty">Belum ada transaksi bulan ini.</div>';
    return;
  }
  for (const t of d.transactions) {
    const isIn = t.tx_type === 'income';
    const date = new Date(t.created_at).toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', timeZone: 'Asia/Jakarta' });
    const desc = (t.emoji ? t.emoji + ' ' : '') + (t.note || t.category || '-');
    const row = document.createElement('div');
    row.className = 'rx';
    row.innerHTML =
      '<span class="date"></span><span class="desc"></span>' +
      '<span class="leaders"></span>' +
      '<span class="amt' + (isIn ? ' in' : '') + '"></span>';
    row.querySelector('.date').textContent = date;
    row.querySelector('.desc').textContent = desc;
    row.querySelector('.amt').textContent = (isIn ? '+' : '') + rp(t.amount);
    list.appendChild(row);
  }
}

const monthInput = $('month');
monthInput.value = nowMonth();
monthInput.addEventListener('change', () => load(monthInput.value));
load(monthInput.value);
</script>
</body>
</html>
